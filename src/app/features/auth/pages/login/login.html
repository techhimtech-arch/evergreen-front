<div class="login-container">
  <div class="login-wrapper">
    <div class="login-header">
      <img src="assets/images/logo.png" alt="HP Evergreen Logo" class="logo" onerror="this.style.display='none'">
      <h1>HP Evergreen Project</h1>
      <p>Community Plantation Management System</p>
    </div>

    <p-card>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        
        <div class="field">
          <label for="username">User ID / Mobile <span class="required">*</span></label>
          <span class="p-input-icon-left">
            <i class="pi pi-user"></i>
            <input id="username" type="text" pInputText formControlName="username" placeholder="Enter username or mobile" />
          </span>
          <small class="p-error block mt-1" *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
            Username is required.
          </small>
        </div>

        <div class="field mt-3">
          <label for="password">Password <span class="required">*</span></label>
          <span class="p-input-icon-left">
            <i class="pi pi-lock"></i>
            <p-password id="password" formControlName="password" [toggleMask]="true" [feedback]="false" placeholder="Enter password"></p-password>
          </span>
          <small class="p-error block mt-1" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            Password is required.
          </small>
        </div>

        <div class="form-actions mt-4">
          <p-button label="Login" type="submit" [disabled]="loginForm.invalid || isLoading" [loading]="isLoading" styleClass="w-full"></p-button>
        </div>

        <div class="mt-3 text-center text-sm text-gray-600">
          <p>Login Hints: "super_admin", "admin", "verifier", "group_leader"</p>
        </div>
      </form>
    </p-card>
  </div>
</div>
