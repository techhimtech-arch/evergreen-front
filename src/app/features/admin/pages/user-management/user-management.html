<div class="card">
  <div class="flex justify-content-between align-items-center mb-4">
    <h2 class="m-0 text-xl font-bold">User Management</h2>
    <p-button label="Add New User" icon="pi pi-plus" (onClick)="openNew()" severity="success"></p-button>
  </div>

  <!-- Search and Filter Controls -->
  <div class="grid mb-4">
    <div class="col-12 md:col-4">
      <span class="p-input-icon-left w-full">
        <i class="pi pi-search"></i>
        <input pInputText type="text" placeholder="Search users..." [(ngModel)]="searchQuery" (input)="onSearch()" class="w-full" />
      </span>
    </div>
    <div class="col-12 md:col-3">
      <p-select [options]="roleOptions" [(ngModel)]="selectedRole" (onChange)="onFilterChange()" placeholder="Filter by Role" optionLabel="label" optionValue="value" appendTo="body" styleClass="w-full"></p-select>
    </div>
    <div class="col-12 md:col-3">
      <p-select [options]="[{label: 'Active', value: 'active'}, {label: 'Inactive', value: 'inactive'}]" [(ngModel)]="selectedStatus" (onChange)="onFilterChange()" placeholder="Filter by Status" optionLabel="label" optionValue="value" appendTo="body" styleClass="w-full"></p-select>
    </div>
    <div class="col-12 md:col-2">
      <p-button label="Clear Filters" icon="pi pi-filter-slash" (onClick)="searchQuery=''; selectedRole=''; selectedStatus=''; onFilterChange()" severity="secondary" styleClass="w-full"></p-button>
    </div>
  </div>

  <p-table [value]="users()" [loading]="isLoading()" [paginator]="true" [rows]="10" responsiveLayout="scroll" styleClass="p-datatable-sm p-datatable-gridlines p-datatable-striped">
    <ng-template #header>
      <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email Address</th>
        <th>Role Name</th>
        <th>Status</th>
        <th style="width: 20vw">Actions</th>
      </tr>
    </ng-template>
    <ng-template #body let-user>
      <tr>
        <td>{{user.firstName}}</td>
        <td>{{user.lastName}}</td>
        <td>{{user.email}}</td>
        <td><span class="p-badge p-badge-info">{{user.role?.name || user.roleId || 'N/A'}}</span></td>
        <td>
          <span class="p-badge" [class]="user.isActive ? 'p-badge-success' : 'p-badge-danger'">
            {{user.isActive ? 'Active' : 'Inactive'}}
          </span>
        </td>
        <td>
          <p-button icon="pi pi-pencil" class="mr-2" [rounded]="true" [text]="true" severity="info" (onClick)="editUser(user)"></p-button>
          <p-button 
            [icon]="user.isActive ? 'pi pi-ban' : 'pi pi-check'" 
            class="mr-2" 
            [rounded]="true" 
            [text]="true" 
            [severity]="user.isActive ? 'help' : 'success'" 
            (onClick)="toggleUserStatus(user)"
            pTooltip="{{user.isActive ? 'Deactivate' : 'Activate'}} User">
          </p-button>
          <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="deleteUser(user.id)"></p-button>
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="6" class="text-center p-4 text-color-secondary">No records found. Data is empty or server unreachable.</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog [(visible)]="displayDialog" [header]="isEditing ? 'Edit User Details' : 'Create New User'" [modal]="true" [style]="{width: '450px'}" styleClass="p-fluid">
  <form [formGroup]="userForm" (ngSubmit)="saveUser()" class="mt-4">
    <div class="field mb-4">
      <label for="firstName" class="font-medium text-800">First Name <span class="text-red-500">*</span></label>
      <input type="text" pInputText id="firstName" formControlName="firstName" autofocus class="w-full mt-2" />
    </div>
    
    <div class="field mb-4">
      <label for="lastName" class="font-medium text-800">Last Name <span class="text-red-500">*</span></label>
      <input type="text" pInputText id="lastName" formControlName="lastName" class="w-full mt-2" />
    </div>

    <div class="field mb-4">
      <label for="email" class="font-medium text-800">Email Address <span class="text-red-500">*</span></label>
      <input type="email" pInputText id="email" formControlName="email" class="w-full mt-2" />
    </div>

    <!-- Only show Password block when creating, normally masked during simple Edit flows -->
    <div class="field mb-4" *ngIf="!isEditing">
      <label for="password" class="font-medium text-800">Password <span class="text-red-500">*</span></label>
      <input type="password" pInputText id="password" formControlName="password" class="w-full mt-2" />
    </div>

    <div class="field mb-5">
      <label for="roleId" class="font-medium text-800">Operational Role <span class="text-red-500">*</span></label>
      <p-select id="roleId" [options]="roleOptions" formControlName="roleId" optionLabel="label" optionValue="value" placeholder="Select Valid Role" appendTo="body" styleClass="w-full mt-2"></p-select>
    </div>

    <div class="field mb-5">
      <label for="isActive" class="font-medium text-800">Account Status</label>
      <p-select id="isActive" [options]="[{label: 'Active', value: true}, {label: 'Inactive', value: false}]" formControlName="isActive" optionLabel="label" optionValue="value" placeholder="Select Status" appendTo="body" styleClass="w-full mt-2"></p-select>
    </div>

    <div class="flex justify-content-end gap-3 pt-3 border-top-1 surface-border">
      <p-button label="Cancel" icon="pi pi-times" [text]="true" severity="secondary" (onClick)="displayDialog = false"></p-button>
      <p-button label="Save Changes" icon="pi pi-check" type="submit" [disabled]="userForm.invalid"></p-button>
    </div>
  </form>
</p-dialog>
