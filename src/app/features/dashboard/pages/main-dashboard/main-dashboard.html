<div class="dashboard-container">
  <div class="header">
    <h2>Overview Dashboard</h2>
    <p>Himachal Pradesh Community Plantation summary up to date.</p>
  </div>

  <div class="stats-grid">
    <p-card class="stat-card">
      <div class="stat-content">
        <div class="stat-info">
          <span class="stat-title">Total Groups</span>
          <span class="stat-value">{{ stats().totalGroups }}</span>
        </div>
        <div class="stat-icon bg-blue-100 text-blue-500">
          <i class="pi pi-users"></i>
        </div>
      </div>
    </p-card>

    <p-card class="stat-card">
      <div class="stat-content">
        <div class="stat-info">
          <span class="stat-title">Plantation Sites</span>
          <span class="stat-value">{{ stats().plantationSites }}</span>
        </div>
        <div class="stat-icon bg-green-100 text-green-500">
          <i class="pi pi-map-marker"></i>
        </div>
      </div>
    </p-card>

    <p-card class="stat-card">
      <div class="stat-content">
        <div class="stat-info">
          <span class="stat-title">Total Plants Planted</span>
          <span class="stat-value">{{ stats().totalPlants }}</span>
        </div>
        <div class="stat-icon bg-orange-100 text-orange-500">
          <i class="pi pi-tree"></i>
        </div>
      </div>
    </p-card>

    <p-card class="stat-card">
      <div class="stat-content">
        <div class="stat-info">
          <span class="stat-title">Survival Percentage</span>
          <span class="stat-value text-green-600">{{ stats().survivalRate }}</span>
        </div>
        <div class="stat-icon bg-purple-100 text-purple-500">
          <i class="pi pi-verified"></i>
        </div>
      </div>
    </p-card>
  </div>

  <div class="charts-grid">
    <p-card header="Survival Monitoring (30/60/90 Days)" class="chart-card">
      <p-chart type="bar" [data]="basicData" [options]="basicOptions" height="300px"></p-chart>
    </p-card>

    <p-card header="District-wise Plantations" class="chart-card">
      <p-chart type="pie" [data]="chartData" [options]="chartOptions" height="300px"></p-chart>
    </p-card>
  </div>
</div>
